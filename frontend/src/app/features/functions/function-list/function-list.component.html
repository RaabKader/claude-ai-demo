<div class="header">
  <h2>Job Functions</h2>
  <button mat-raised-button color="primary" (click)="openCreate()">
    <mat-icon>add</mat-icon> New Function
  </button>
</div>

<div *ngIf="loading" class="spinner-wrapper">
  <mat-spinner></mat-spinner>
</div>

<mat-table [dataSource]="functions" *ngIf="!loading">
  <ng-container matColumnDef="label">
    <mat-header-cell *matHeaderCellDef>Label</mat-header-cell>
    <mat-cell *matCellDef="let row">{{ row.label }}</mat-cell>
  </ng-container>

  <ng-container matColumnDef="description">
    <mat-header-cell *matHeaderCellDef>Description</mat-header-cell>
    <mat-cell *matCellDef="let row">{{ row.description }}</mat-cell>
  </ng-container>

  <ng-container matColumnDef="actions">
    <mat-header-cell *matHeaderCellDef>Actions</mat-header-cell>
    <mat-cell *matCellDef="let row">
      <button mat-icon-button color="primary" (click)="openEdit(row)" matTooltip="Edit">
        <mat-icon>edit</mat-icon>
      </button>
      <button mat-icon-button color="warn" (click)="delete(row)" matTooltip="Delete">
        <mat-icon>delete</mat-icon>
      </button>
    </mat-cell>
  </ng-container>

  <mat-header-row *matHeaderRowDef="displayedColumns"></mat-header-row>
  <mat-row *matRowDef="let row; columns: displayedColumns;"></mat-row>
</mat-table>

<p *ngIf="!loading && functions.length === 0" class="empty-msg">No functions found.</p>
