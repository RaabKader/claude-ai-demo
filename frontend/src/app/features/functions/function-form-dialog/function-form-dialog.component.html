<h2 mat-dialog-title>{{ isEdit ? 'Edit Function' : 'New Function' }}</h2>

<mat-dialog-content [formGroup]="form">
  <mat-form-field appearance="outline" class="full-width">
    <mat-label>Label</mat-label>
    <input matInput formControlName="label" placeholder="e.g. Software Engineer">
    <mat-error *ngIf="form.get('label')?.hasError('required')">Label is required</mat-error>
  </mat-form-field>

  <mat-form-field appearance="outline" class="full-width">
    <mat-label>Description</mat-label>
    <textarea matInput formControlName="description" rows="3" placeholder="Optional description"></textarea>
  </mat-form-field>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="cancel()">Cancel</button>
  <button mat-raised-button color="primary" (click)="save()" [disabled]="form.invalid">Save</button>
</mat-dialog-actions>
