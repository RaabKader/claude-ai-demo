<h2 mat-dialog-title>{{ isEdit ? 'Edit Address' : 'New Address' }}</h2>

<mat-dialog-content [formGroup]="form">
  <mat-form-field appearance="outline" class="full-width">
    <mat-label>Street</mat-label>
    <input matInput formControlName="street" placeholder="123 Main St">
    <mat-error *ngIf="form.get('street')?.hasError('required')">Street is required</mat-error>
  </mat-form-field>

  <mat-form-field appearance="outline" class="full-width">
    <mat-label>City</mat-label>
    <input matInput formControlName="city">
    <mat-error *ngIf="form.get('city')?.hasError('required')">City is required</mat-error>
  </mat-form-field>

  <mat-form-field appearance="outline" class="full-width">
    <mat-label>Zip Code</mat-label>
    <input matInput formControlName="zipCode">
    <mat-error *ngIf="form.get('zipCode')?.hasError('required')">Zip code is required</mat-error>
  </mat-form-field>

  <mat-form-field appearance="outline" class="full-width">
    <mat-label>Country</mat-label>
    <input matInput formControlName="country">
    <mat-error *ngIf="form.get('country')?.hasError('required')">Country is required</mat-error>
  </mat-form-field>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="cancel()">Cancel</button>
  <button mat-raised-button color="primary" (click)="save()" [disabled]="form.invalid">Save</button>
</mat-dialog-actions>
