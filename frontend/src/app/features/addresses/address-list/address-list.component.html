<div class="header">
  <h2>Addresses</h2>
  <button mat-raised-button color="primary" (click)="openCreate()">
    <mat-icon>add</mat-icon> New Address
  </button>
</div>

<div *ngIf="loading" class="spinner-wrapper">
  <mat-spinner></mat-spinner>
</div>

<mat-table [dataSource]="addresses" *ngIf="!loading">
  <ng-container matColumnDef="street">
    <mat-header-cell *matHeaderCellDef>Street</mat-header-cell>
    <mat-cell *matCellDef="let row">{{ row.street }}</mat-cell>
  </ng-container>

  <ng-container matColumnDef="city">
    <mat-header-cell *matHeaderCellDef>City</mat-header-cell>
    <mat-cell *matCellDef="let row">{{ row.city }}</mat-cell>
  </ng-container>

  <ng-container matColumnDef="zipCode">
    <mat-header-cell *matHeaderCellDef>Zip Code</mat-header-cell>
    <mat-cell *matCellDef="let row">{{ row.zipCode }}</mat-cell>
  </ng-container>

  <ng-container matColumnDef="country">
    <mat-header-cell *matHeaderCellDef>Country</mat-header-cell>
    <mat-cell *matCellDef="let row">{{ row.country }}</mat-cell>
  </ng-container>

  <ng-container matColumnDef="actions">
    <mat-header-cell *matHeaderCellDef>Actions</mat-header-cell>
    <mat-cell *matCellDef="let row">
      <button mat-icon-button color="primary" (click)="openEdit(row)" matTooltip="Edit">
        <mat-icon>edit</mat-icon>
      </button>
      <button mat-icon-button color="warn" (click)="delete(row)" matTooltip="Delete">
        <mat-icon>delete</mat-icon>
      </button>
    </mat-cell>
  </ng-container>

  <mat-header-row *matHeaderRowDef="displayedColumns"></mat-header-row>
  <mat-row *matRowDef="let row; columns: displayedColumns;"></mat-row>
</mat-table>

<p *ngIf="!loading && addresses.length === 0" class="empty-msg">No addresses found.</p>
